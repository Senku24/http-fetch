<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass1</title>
    <script>
        async function requestInfo() {
            const res = await fetch("/request-info");
            const json = await res.json();
            document.getElementById("result").innerHTML = JSON.stringify(json);
            
        }
    </script>
</head>
<body>
    <h1>frontend</h1>
    <button onclick="requestInfo()">Request Info</button>
    <div id="result"></div>

</body>
</html>
